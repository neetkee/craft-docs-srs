name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun build --compile --target bun-darwin-arm64 src/index.tsx --outfile craft-docs-srs

      - uses: actions/upload-artifact@v4
        with:
          name: craft-docs-srs-darwin-arm64
          path: craft-docs-srs

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: craft-docs-srs-darwin-arm64

      - run: gh release create "$GITHUB_REF_NAME" craft-docs-srs --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
